name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
        
    strategy:
      matrix:
        os: [ubuntu-latest, windows-2022]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Start virtual display (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x24 &

      - name: Build Electron app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get package version
        run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Publish release
        if: github.ref == 'refs/heads/main'
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest Android APKs from gps-snemanje-app
        if: github.ref == 'refs/heads/main' && runner.os == 'Linux'
        run: |
          mkdir -p apks
          gh release download --repo PolicAI-org/gps-snemanje-app --pattern '*.apk' --dir apks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach roads.zip and Android APKs to release
        if: github.ref == 'refs/heads/main' && runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          files: |
            roads.zip
            apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
